<!DOCTYPE html>
<html>

<head>
    <title>Digital Clock</title>

</head>

<body>
    <h1>Digital Clock</h1>
    
    <h2 id="clock"></h2>

    <script>

         function showtime() {

            let now = new Date();

            let time = now.toLocaleTimeString();

            document.getElementById("clock").innerText = time;
        }

        setInterval(showtime, 1000);

    </script>
</body>
</html>
